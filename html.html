<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Timetable Generator</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    color:white;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:1100px;
    margin:40px auto;
}

.title{
    text-align:center;
    padding:30px;
    background:linear-gradient(to right,#3b82f6,#9333ea);
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.title h1{
    margin:0;
    font-size:3rem;
}

.creator-box{
    margin-top:35px;
    background:rgba(15,23,42,0.95);
    padding:35px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.creator-box h2{
    text-align:center;
    color:#60a5fa;
}

.inputs{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
    margin-top:25px;
}

input{
    padding:14px;
    border:none;
    border-radius:12px;
    width:220px;
    background:#1e293b;
    color:white;
    font-size:1rem;
    outline:none;
}

.add-btn{
    padding:14px 25px;
    border:none;
    border-radius:14px;
    background:linear-gradient(to right,#3b82f6,#9333ea);
    color:white;
    font-size:1rem;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.add-btn:hover{
    transform:scale(1.05);
}

.schedule{
    margin-top:35px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    border:2px solid #3b82f6;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    position:relative;
}

.card h3{
    margin-top:0;
    color:#60a5fa;
}

.delete-btn{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#ef4444;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.delete-btn:hover{
    background:#dc2626;
}

.total{
    margin-top:35px;
    background:#111827;
    padding:25px;
    border-radius:20px;
    text-align:center;
    font-size:1.3rem;
    border:2px solid #9333ea;
}

.empty{
    text-align:center;
    opacity:0.7;
    margin-top:25px;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>🚀 Custom Timetable Generator</h1>
        <p>Create your own study timetable</p>
    </div>

    <div class="creator-box">

        <h2>📚 Add Study Session</h2>

        <div class="inputs">

            <input type="text" id="subject" placeholder="Subject Name">

            <input type="time" id="start">

            <input type="time" id="end">

            <input type="number" id="hours" placeholder="Hours">

            <button class="add-btn" onclick="addTask()">➕ Add</button>

        </div>

        <div id="schedule" class="schedule">
            <p class="empty" id="emptyText">
                No timetable created yet...
            </p>
        </div>

        <div class="total">
            ⏰ Total Study Hours:
            <span id="totalHours">0</span>
            Hours
        </div>

    </div>

</div>

<script>

let total = 0;

function addTask(){

    const subject = document.getElementById("subject").value;
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;
    const hours = document.getElementById("hours").value;

    if(subject === "" || start === "" || end === "" || hours === ""){
        alert("Please fill all inputs");
        return;
    }

    document.getElementById("emptyText").style.display = "none";

    const schedule = document.getElementById("schedule");

    const card = document.createElement("div");

    card.classList.add("card");

    card.innerHTML = `
        <h3>📘 ${subject}</h3>
        <p>🕒 ${start} - ${end}</p>
        <p>⏳ ${hours} Hours</p>

        <button class="delete-btn">
            🗑 Delete
        </button>
    `;

    schedule.appendChild(card);

    total += Number(hours);

    document.getElementById("totalHours").textContent = total;

    const deleteBtn = card.querySelector(".delete-btn");

    deleteBtn.onclick = function(){

        total -= Number(hours);

        document.getElementById("totalHours").textContent = total;

        card.remove();

        if(schedule.children.length === 0){
            document.getElementById("emptyText").style.display = "block";
        }

    };
    document.getElementById("subject").value = "";
    document.getElementById("start").value = "";
    document.getElementById("end").value = "";
    document.getElementById("hours").value = "";
}
</script>
</body>
</html>
