<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Timetable Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="title">
        <h1>🚀 Custom Timetable Generator</h1>
        <p>Create your own study timetable</p>
    </div>

    <div class="creator-box">

        <h2>📚 Add Study Session</h2>

        <div class="inputs">

            <input type="text" id="subject" placeholder="Subject Name">

            <input type="time" id="start">

            <input type="time" id="end">

            <input type="number" id="hours" placeholder="Hours">

            <button class="add-btn" onclick="addTask()">➕ Add</button>

        </div>

        <div id="schedule" class="schedule">
            <p class="empty" id="emptyText">
                No timetable created yet...
            </p>
        </div>

        <div class="total">
            ⏰ Total Study Hours:
            <span id="totalHours">0</span>
            Hours
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
